<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrandeX Sloet Froom - IDE y Visor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <div class="logo-container">
            <img src="sloetfroom.png" alt="Logo" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><circle cx=\'50\' cy=\'50\' r=\'40\' fill=\'none\' stroke=\'%23888\' stroke-width=\'5\'/></svg>'">
            <div class="logo-text">
                <span class="logo-text-main">TrandeX</span>
                <span class="logo-text-sub">Sloet Froom</span>
            </div>
        </div>
        
        <div class="view-toggles">
            <button id="btn-editor" class="active" onclick="setMode('editor')">Editor</button>
            <button id="btn-movil" onclick="setMode('movil')">Vista Móvil</button>
            <button id="btn-pc" onclick="setMode('pc')">Vista PC</button>
        </div>
    </header>

    <div class="main-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Explorador</span>
                <div class="sidebar-actions">
                    <button class="icon-btn" onclick="showInput('file')" title="Nuevo Archivo">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zm-2 10h-2v-3H8v3H6v-3H4v3H2v-2h2v-3h2v3h2v-3h2v3h2v2zm0-7H9v-2h2v2zm0-4H9V7h2v2z"/></svg>
                    </button>
                    <button class="icon-btn" onclick="showInput('folder')" title="Nueva Carpeta">
                        <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/><path d="M15 10h-2v2h-2v2h2v2h2v-2h2v-2h-2z"/></svg>
                    </button>
                </div>
            </div>

            <div class="new-item-input-container" id="inputContainer">
                <input type="text" class="new-item-input" id="newItemInput" placeholder="Nombre...">
            </div>

            <div class="file-tree" id="fileTree"></div>
        </aside>

        <section class="content-area show-editor" id="contentArea">
            
            <div class="editor-container" id="editorContainer">
                <div class="tabs-bar" id="tabsBar"></div>
                <textarea class="editor-textarea" id="codeEditor" spellcheck="false" placeholder="Selecciona o crea un archivo en el explorador..."></textarea>
                <div id="emptyState" class="empty-state" style="display: none;">
                    Crea un archivo "index.html" en el explorador para empezar a programar tu web o videojuego.
                </div>
            </div>

            <div class="preview-container" id="previewContainer">
                <div class="device-frame" id="deviceFrame">
                    <iframe class="preview-iframe" id="previewIframe" sandbox="allow-scripts allow-modals allow-same-origin allow-popups allow-pointer-lock" allow="fullscreen; xr-spatial-tracking; autoplay" frameborder="0"></iframe>
                </div>
            </div>

        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
